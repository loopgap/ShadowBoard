name: Continuous Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv\Scripts\Activate.ps1
          python -m pip install --upgrade pip
          pip install -e .
          pip install aiosqlite aiofiles PyJWT pytest-asyncio pytest-mock ruff

      - name: Install Playwright Browsers
        run: |
          .venv\Scripts\Activate.ps1
          python -m playwright install --with-deps chromium

      - name: Run Quality Gate (Lint, Test, Perf)
        env:
          CI: "true"
        run: |
          .venv\Scripts\Activate.ps1
          .\quality_gate.ps1
