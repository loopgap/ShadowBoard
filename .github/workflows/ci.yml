name: Continuous Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run ShadowBoard Setup and Quality Gate
        shell: pwsh
        run: |
          # The Go runner handles venv creation, pip installs, and playwright install
          go run sb.go setup
          go run sb.go check
